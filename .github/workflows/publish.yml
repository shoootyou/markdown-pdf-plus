# ==============================================================================
# publish.yml — Build, package, and publish markdown-pdf-plus to the Marketplace
# ==============================================================================
#
# Triggered on every push to `main`. On each run the workflow:
#   1. Computes a date-based version (YYYY.M.D, UTC — e.g. 2025.6.15).
#   2. Skips the entire release pipeline if a tag for today already exists
#      (at most one release per calendar day).
#   3. Bumps the version in package.json and pushes a chore(release) commit.
#   4. Runs TypeScript type-checking, ESLint, and the esbuild production bundle.
#   5. Packages a .vsix, publishes it to the VS Code Marketplace, and creates a
#      GitHub Release with the .vsix attached.
#
# ── Prerequisites ─────────────────────────────────────────────────────────────
#
#   VSCE_PAT  Repository secret — a personal access token scoped to the Azure
#             DevOps "Marketplace (Manage)" permission.
#             Guide: https://code.visualstudio.com/api/working-with-extensions/publishing-extension#get-a-personal-access-token
#
# TODO: Before enabling this workflow, confirm that VSCE_PAT is configured as a
#       repository secret under Settings → Secrets and variables → Actions.
#
# TODO: Verify that the publisher ID "tom-latham" in package.json matches the
#       publisher registered at https://marketplace.visualstudio.com/manage —
#       the publish step will fail with a 401/403 if these do not align.
#
# ==============================================================================

name: publish

on:
  push:
    branches: [main]

# Cancel any in-progress publish run when a new push arrives on main.
concurrency:
  group: publish
  cancel-in-progress: true

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest

    # Recursion guard: the version-bump commit (step 5 below) itself triggers
    # another push to main. Skip the job when that commit is the trigger so we
    # don't loop indefinitely.
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"

    permissions:
      contents: write  # push version-bump commit, create git tag and GitHub Release

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      # fetch-depth: 0 is required so we can check existing remote tags and push
      # the version-bump commit back to main.
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Node.js + yarn cache ───────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "yarn"

      # ── 3. Compute date-based version (YYYY.M.D, UTC, no zero-padding) ────────
      - name: Compute release version
        run: |
          VERSION=$(node -e "
            const d = new Date();
            process.stdout.write(
              d.getUTCFullYear() + '.' +
              (d.getUTCMonth() + 1) + '.' +
              d.getUTCDate()
            );
          ")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Computed version: $VERSION"

      # ── 4. Check whether today's release tag already exists ───────────────────
      # If the tag exists we set SKIP_RELEASE=true, which short-circuits every
      # subsequent step. This lets multiple pushes on the same calendar day
      # pass through CI without attempting a duplicate publish.
      - name: Check for existing release tag
        run: |
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q .; then
            echo "Tag v$VERSION already exists — nothing to publish today."
            echo "SKIP_RELEASE=true" >> "$GITHUB_ENV"
          else
            echo "SKIP_RELEASE=false" >> "$GITHUB_ENV"
          fi

      # ── 5. Bump version in package.json + push ────────────────────────────────
      # Uses `npm version` (always available on the runner) purely to update the
      # version field in package.json; --no-git-tag-version prevents npm from
      # creating its own commit or tag. We create the commit ourselves so we can
      # control the message, author, and email precisely.
      # yarn.lock is not affected by a version-only bump; no need to add it.
      - name: Bump package.json version
        if: env.SKIP_RELEASE == 'false'
        run: |
          CURRENT=$(node -e "process.stdout.write(require('./package.json').version)")
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "package.json is already at $VERSION — skipping bump commit."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            npm version "$VERSION" --no-git-tag-version
            git add package.json
            git commit -m "chore(release): bump version to $VERSION"
            git push
          fi

      # ── 6. Install dependencies ───────────────────────────────────────────────
      # --frozen-lockfile ensures yarn.lock is never auto-mutated in CI.
      # Note: .yarnrc already carries --ignore-engines so no extra flag is needed.
      - name: Install dependencies
        if: env.SKIP_RELEASE == 'false'
        run: yarn install --frozen-lockfile

      # ── 7. TypeScript compile check ───────────────────────────────────────────
      # Runs `tsc -p ./` — catches type errors without producing a production
      # bundle (that is esbuild's job in step 9).
      - name: TypeScript compile check
        if: env.SKIP_RELEASE == 'false'
        run: yarn run compile

      # ── 8. ESLint ─────────────────────────────────────────────────────────────
      - name: ESLint
        if: env.SKIP_RELEASE == 'false'
        run: yarn run lint

      # ── 9. Production bundle (esbuild, minified) ──────────────────────────────
      # Runs `esbuild ./src/extension.ts --bundle --minify ...` (vscode:prepublish).
      # Note: vsce package (step 10) also invokes vscode:prepublish internally as
      # part of its lifecycle. Running it explicitly here makes the build step
      # visible in the job log and catches bundle errors before vsce runs.
      - name: Build production bundle
        if: env.SKIP_RELEASE == 'false'
        run: yarn run vscode:prepublish

      # ── 10. Package VSIX ──────────────────────────────────────────────────────
      # vsce package invokes vscode:prepublish again (its built-in lifecycle).
      # The rebuild is fast (esbuild) and ensures the packaged output is from a
      # clean, single vsce-orchestrated run — consistent with local packaging.
      - name: Package VSIX
        if: env.SKIP_RELEASE == 'false'
        run: |
          ./node_modules/.bin/vsce package --yarn
          echo "VSIX_FILE=markdown-pdf-plus-$VERSION.vsix" >> "$GITHUB_ENV"

      # ── 10b. Upload VSIX as a workflow artifact ────────────────────────────────
      - name: Upload VSIX artifact
        if: env.SKIP_RELEASE == 'false'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vsix-${{ env.VERSION }}
          path: ${{ env.VSIX_FILE }}
          retention-days: 90

      # ── 11. Publish to VS Code Marketplace ────────────────────────────────────
      # Publishes the pre-built VSIX via --packagePath so vsce skips re-packaging.
      # Requires the VSCE_PAT repository secret (see Prerequisites at top of file).
      #
      # TODO: Add VSCE_PAT to repository secrets before merging this workflow.
      # TODO: Confirm publisher "tom-latham" matches the Marketplace account that
      #       owns the VSCE_PAT token — mismatches produce a silent 401 error.
      - name: Publish to VS Code Marketplace
        if: env.SKIP_RELEASE == 'false'
        run: ./node_modules/.bin/vsce publish --packagePath "$VSIX_FILE"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # ── 12. Create git tag + GitHub Release ───────────────────────────────────
      # softprops/action-gh-release creates the tag and release in one step.
      # The VSIX is attached as a release asset so users can install directly
      # without going to the Marketplace.
      - name: Create GitHub Release
        if: env.SKIP_RELEASE == 'false'
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body: |
            Automated release for **v${{ env.VERSION }}**.

            ### Install from Marketplace
            Search for *Markdown PDF Plus* in the VS Code Extensions view, or visit:
            https://marketplace.visualstudio.com/items?itemName=tom-latham.markdown-pdf-plus

            ### Install from VSIX (offline)
            Download `markdown-pdf-plus-${{ env.VERSION }}.vsix` below and run:
            ```
            code --install-extension markdown-pdf-plus-${{ env.VERSION }}.vsix
            ```

            See [CHANGELOG.md](https://github.com/ThomasLatham/markdown-pdf-plus/blob/main/CHANGELOG.md) for what changed.
          files: ${{ env.VSIX_FILE }}
          fail_on_unmatched_files: true

      # ── 13. Job summary ───────────────────────────────────────────────────────
      - name: Write release summary
        if: env.SKIP_RELEASE == 'false'
        run: |
          echo "## ✅ Released v${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| VSIX | \`${VSIX_FILE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | \`v${VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Marketplace | [markdown-pdf-plus](https://marketplace.visualstudio.com/items?itemName=tom-latham.markdown-pdf-plus) |" >> "$GITHUB_STEP_SUMMARY"

      - name: Write skip summary
        if: env.SKIP_RELEASE == 'true'
        run: |
          echo "## ⏭️ Release skipped — v${VERSION} already published today" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag \`v${VERSION}\` already exists on the remote. No action taken." >> "$GITHUB_STEP_SUMMARY"
